services:
  gateway:
    build: ./server
    container_name: api_gateway

    working_dir: /app

    ports:
      - "5001:5001"

    volumes:
      - ./server:/app
      - /app/node_modules

    env_file:
      - .env.development
    
    networks:
      - micro-services-net

    command: npm run dev

networks:
  micro-services-net:
    external: true