services:
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - micro-services-net
    restart: always
  gateway:
    build: ./server
    container_name: api_gateway

    working_dir: /app

    ports:
      - "5001:5001"

    volumes:
      - ./server:/app
      - /app/node_modules

    env_file:
      - .env.development
    
    networks:
      - micro-services-net
    depends_on:
      - redis

    command: npm run dev

networks:
  micro-services-net:
    external: true